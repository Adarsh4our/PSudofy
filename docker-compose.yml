services:
  navidrome:
    image: "deluan/navidrome:latest"
    ports:
      - "4533:4533"
    restart: unless-stopped
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
    volumes:
      - "./data:/data"
      - "./music:/music:ro"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4533/ping"]
      interval: 30s
      timeout: 5s
      retries: 3

